id: chatbi-smart-query-log-extractor
name: ChatBI Smart Query Log Extractor
summary: Auto-discover unique ChatBI smart-query questions from sql_template_match logs, keep sql_template_match as the stable call anchor and match_id source, use call sqlflow input for root-call boundaries and full child-thread MASK QUESTION markers to attribute cross-thread activity, extract retry metadata and tri-state flow status (failed/success/unknown), and render JSON and HTML outputs.
type: script
scope: shared
category: dev
status: temporary
project: ChatBI
tags:
  - chatbi
  - log-analysis
  - html-report
runtime: python
entrypoint: python -m chatbi_smart_query_log_extractor
created_at: 2026-04-03
last_verified_at: 2026-04-07
dependencies:
  - requests
  - pyyaml
artifacts:
  - "*.json"
  - "*.html"
interface:
  command: python -m chatbi_smart_query_log_extractor
  args:
    - name: log
      required: false
      description: Path to the ChatBI plain-text log file. Required for static output mode; optional when --serve starts the browser-based log viewer.
    - name: question
      required: false
      description: Optional exact question filter. When omitted, the tool auto-discovers all unique questions from sql_template_match anchor logs, uses call sqlflow input to split root calls, and uses full child-thread MASK QUESTION markers to group child-thread activity back into the matching root call.
    - name: output-dir
      required: false
      description: Directory for generated JSON and HTML outputs.
    - name: encoding
      required: false
      description: Explicit log encoding. When omitted, the tool tries UTF-8 and GBK variants.
    - name: json-only
      required: false
      description: Generate only the JSON result.
    - name: html-only
      required: false
      description: Generate only the HTML result.
    - name: serve
      required: false
      description: Start a fixed-port local interactive server that can parse logs from the browser page and execute prompt or complete_ir actions.
    - name: host
      required: false
      description: Host address for the local interactive report server. Default is 127.0.0.1.
    - name: port
      required: false
      description: Port for the local interactive report server. Default is 8000. Use 0 to auto-assign a free port.
  input:
    kind: file
    format: text log
  output:
    kind: files
    format: json + html
    fields:
      - question groups
      - thread_id
      - associated_thread_ids
      - match_id
      - rewrite_questions
      - flow_status
      - retry_count
      - verifier_failures
      - rag_results
      - rewritten_question
      - recalled_tables
      - ir_table_definition
      - final_prompt
      - generated_ir
      - complete_ir
      - complete_ir_execution
  exit_codes:
    0: success with at least one fully parsed match
    1: runtime failure while reading or writing files
    2: invalid input arguments
    3: no matching call found
    4: matches found but at least one section is missing or partially parsed
  side_effects:
    - creates output directories
    - writes JSON and HTML report files
    - can start a local HTTP server and call a fake /chat/completion endpoint with requests verify=False
    - can write complete_ir into a configured target project directory and execute it via a local command located by match_id
    - in --serve mode keeps the currently parsed report in memory and lets the page switch logs without changing port
  examples:
    - command: python -m chatbi_smart_query_log_extractor --log .\chatbi.log --output-dir .\output
      description: Auto-discover all unique questions from the log and generate grouped JSON and HTML outputs.
    - command: python -m chatbi_smart_query_log_extractor --log .\chatbi.log --question "近7天销售额是多少" --output-dir .\output
      description: Extract only one exact question group from the discovered questions and generate both output formats.
    - command: python -m chatbi_smart_query_log_extractor --log .\chatbi.log --output-dir .\output --serve
      description: Generate files, start a fixed-port report server, preload one report, and allow switching to other logs from the browser page.
    - command: python -m chatbi_smart_query_log_extractor --serve
      description: Start an empty browser-based log viewer that can select a log file or directory and parse files without pre-generating outputs.
local_config:
  files:
    - executors.example.yaml
    - executors.local.yaml
  description: Copy the example file to executors.local.yaml and fill in local executor paths, working directory, and optional env or PYTHONPATH overrides for complete_ir execution.
